# ============================================================
# SmartPark - 05-jenkins.yaml
# WHERE TO PLACE: k8s/ folder in your project
# APPLY WITH: kubectl apply -f k8s/05-jenkins.yaml
# PURPOSE: Run Jenkins inside Kubernetes for CI/CD
# ============================================================

# ── Jenkins PVC ──────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jenkins-pvc
  namespace: smartpark

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 10Gi

  storageClassName: gp2

---
# ── Jenkins Deployment ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: smartpark
  labels:
    app: jenkins

spec:
  replicas: 1

  selector:
    matchLabels:
      app: jenkins

  template:
    metadata:
      labels:
        app: jenkins

    spec:
      serviceAccountName: jenkins-sa

      securityContext:
        fsGroup: 1000
        runAsUser: 1000

      nodeSelector:
        kubernetes.io/hostname: smartpark-master

      containers:
        - name: jenkins
          image: jenkins/jenkins:lts-jdk17

          ports:
            - containerPort: 8080
            - containerPort: 50000

          env:
            - name: JAVA_OPTS
              value: "-Xmx2g -Dhudson.plugins.git.GitSCM.ALLOW_LOCAL_CHECKOUT=true"

          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home

            - name: docker-sock
              mountPath: /var/run/docker.sock

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1.5Gi"
              cpu: "1000m"

      volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: jenkins-pvc

        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock

---
# ── Jenkins Service ──────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: jenkins-service
  namespace: smartpark

spec:
  selector:
    app: jenkins

  ports:
    - name: web
      port: 8080
      targetPort: 8080

    - name: agent
      port: 50000
      targetPort: 50000

  type: LoadBalancer

---
# ── Jenkins ServiceAccount ───────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-sa
  namespace: smartpark

---
# ── Jenkins RBAC ─────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-cluster-admin

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin

subjects:
  - kind: ServiceAccount
    name: jenkins-sa
    namespace: smartpark
