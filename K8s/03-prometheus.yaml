# ============================================================
# SmartPark - 03-prometheus.yaml
# WHERE TO PLACE: k8s/ folder in your project
# APPLY WITH: kubectl apply -f k8s/03-prometheus.yaml
# ============================================================

# ── Prometheus ConfigMap ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: smartpark

data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: []

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "smartpark-app"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - smartpark

        relabel_configs:
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_scrape
            action: keep
            regex: true

      - job_name: "mysql"
        static_configs:
          - targets:
              - smartpark-mysql-service:9104

      - job_name: "kubernetes-nodes"
        kubernetes_sd_configs:
          - role: node

        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod

        relabel_configs:
          - source_labels:
              - __meta_kubernetes_pod_annotation_prometheus_io_scrape
            action: keep
            regex: true

---
# ── Prometheus PVC ───────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: smartpark

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 10Gi

  storageClassName: local-path # Use local storage for Prometheus data (fast but not durable)

---
# ── Prometheus Deployment ────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: smartpark
  labels:
    app: prometheus

spec:
  replicas: 1

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      serviceAccountName: prometheus-sa

      nodeSelector:
        role: monitoring

      containers:
        - name: prometheus
          image: prom/prometheus:v2.48.0

          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=15d"
            - "--web.enable-lifecycle"

          ports:
            - containerPort: 9090

          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus

            - name: prometheus-storage
              mountPath: /prometheus

          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"

      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config

        - name: prometheus-storage
          persistentVolumeClaim:
            claimName: prometheus-pvc

---
# ── Prometheus Service ───────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: smartpark

spec:
  selector:
    app: prometheus

  ports:
    - port: 9090
      targetPort: 9090

  type: ClusterIP

---
# ── ServiceAccount ───────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-sa
  namespace: smartpark

---
# ── RBAC ─────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-role

rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - services
      - endpoints
    verbs:
      - get
      - list
      - watch

  - apiGroups: ["extensions"]
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-role-binding

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-role

subjects:
  - kind: ServiceAccount
    name: prometheus-sa
    namespace: smartpark
