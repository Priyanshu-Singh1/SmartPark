# ============================================================
# SmartPark - 00-namespace-config.yaml
# WHERE TO PLACE: k8s/ folder in your project
# APPLY WITH: kubectl apply -f k8s/00-namespace-config.yaml
# ============================================================

# ── Namespace ────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: smartpark
  labels:
    app: smartpark
    environment: production

---
# ── ConfigMap (Non-sensitive config) ─────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: smartpark-config
  namespace: smartpark
data:
  DB_HOST: "smartpark-mysql-service"
  DB_PORT: "3306"
  DB_NAME: "smartpark"
  APP_ENV: "production"
  APP_URL: "http://smartpark.yourdomain.com"

---
# ── Secret (Sensitive credentials - base64 encoded) ──────────
# To encode: echo -n "your_value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: smartpark-secret
  namespace: smartpark
type: Opaque
data:
  DB_USER: c21hcnRwYXJrX3VzZXI= # smartpark_user
  DB_PASSWORD: U21hcnRQYXJrQDIwMjQ= # SmartPark@2024
  MYSQL_ROOT_PASSWORD: Um9vdEBTbWFydFBhcmsyMDI0 # Root@SmartPark2024
