# ============================================================
# SmartPark - 02-app-deployment.yaml
# WHERE TO PLACE: k8s/ folder in your project
# APPLY WITH: kubectl apply -f k8s/02-app-deployment.yaml
# NOTE: Replace YOUR_DOCKERHUB_USERNAME with your Docker Hub ID
# ============================================================

# ── SmartPark PHP App Deployment ─────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: smartpark-app
  namespace: smartpark
  labels:
    app: smartpark-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: smartpark-app

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: smartpark-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"

    spec:
      nodeSelector:
        role: app-db

      containers:
        - name: smartpark-php
          image: priyanshusingh18/smartpark:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 80

          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: smartpark-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: smartpark-config
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: smartpark-config
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: smartpark-secret
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartpark-secret
                  key: DB_PASSWORD

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "300m"

          livenessProbe:
            httpGet:
              path: /index.php
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /index.php
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5

---
# ── Service (Use NodePort for kubeadm AWS setup) ─────────────
apiVersion: v1
kind: Service
metadata:
  name: smartpark-service
  namespace: smartpark

spec:
  selector:
    app: smartpark-app

  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080

  type: NodePort

---
# ── Horizontal Pod Autoscaler ────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: smartpark-hpa
  namespace: smartpark

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: smartpark-app

  minReplicas: 2
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
